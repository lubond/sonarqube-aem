name: Release - Docker Build and Push
# Builds and pushes the Docker image to Docker Hub.
# Callable via push, manual run, or workflow_call (e.g. after auto-update commits).

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Git ref (full SHA recommended) to checkout and build."
        type: string
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_call' && inputs.ref || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute image tags
        id: image-tags
        run: echo "build_date=$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Build and Push Multi-Arch Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            lubond/sonarqube-aem:latest
            lubond/sonarqube-aem:${{ steps.image-tags.outputs.build_date }}
          platforms: linux/amd64,linux/arm64
